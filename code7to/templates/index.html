<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Code7to</title>
<link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@300;400;600;700;800&family=JetBrains+Mono:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; }

body {
  background: #050709;
  font-family: 'Oxanium', sans-serif;
  color: #e2edf5;
  cursor: none;
}

/* ── CUSTOM CURSOR — code bracket style ── */
#cursor {
  position: fixed;
  width: 22px; height: 22px;
  pointer-events: none;
  z-index: 99999;
  transform: translate(-50%, -50%);
  transition: width 0.2s, height 0.2s;
}
#cursor::before,
#cursor::after {
  content: '';
  position: absolute;
  width: 8px; height: 16px;
  border: 2px solid #00ff88;
  top: 50%; transform: translateY(-50%);
  box-shadow: 0 0 10px rgba(0,255,136,0.7), 0 0 24px rgba(0,255,136,0.3);
  transition: all 0.2s;
}
#cursor::before {
  left: 0;
  border-right: none;
  border-radius: 2px 0 0 2px;
}
#cursor::after {
  right: 0;
  border-left: none;
  border-radius: 0 2px 2px 0;
}

#cursor-dot {
  position: fixed;
  width: 4px; height: 14px;
  background: #00ff88;
  pointer-events: none;
  z-index: 99999;
  transform: translate(-50%, -50%);
  border-radius: 1px;
  box-shadow: 0 0 8px rgba(0,255,136,0.9);
  animation: cursor-blink 1s step-start infinite;
}
@keyframes cursor-blink { 0%,100%{opacity:1} 50%{opacity:0} }

#cursor-ring {
  position: fixed;
  width: 48px; height: 48px;
  border: 1px solid rgba(0,255,136,0.15);
  border-radius: 50%;
  pointer-events: none;
  z-index: 99998;
  transform: translate(-50%, -50%);
  transition: width 0.3s, height 0.3s, border-color 0.3s;
}
.cursor-hover #cursor { width: 30px; height: 30px; }
.cursor-hover #cursor::before,
.cursor-hover #cursor::after { border-color: #00ff88; box-shadow: 0 0 16px rgba(0,255,136,0.9), 0 0 40px rgba(0,255,136,0.4); }
.cursor-hover #cursor-ring { width: 64px; height: 64px; border-color: rgba(0,255,136,0.3); }

/* ── CANVAS ── */
#bg-canvas {
  position: fixed;
  inset: 0;
  z-index: 0;
}

/* ── SCANLINES ── */
.scanlines {
  position: fixed; inset: 0; z-index: 1;
  background: repeating-linear-gradient(
    0deg, transparent, transparent 2px,
    rgba(0,0,0,0.06) 2px, rgba(0,0,0,0.06) 4px
  );
  pointer-events: none;
}

/* ── VIGNETTE ── */
.vignette {
  position: fixed; inset: 0; z-index: 2;
  background: radial-gradient(ellipse at center, transparent 40%, rgba(5,7,9,0.75) 100%);
  pointer-events: none;
}

/* ══════════════════════════════════════
   PAGE 1 — SPLASH
══════════════════════════════════════ */
#page-splash {
  position: fixed; inset: 0; z-index: 10;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  transition: opacity 0.8s ease, transform 0.8s ease;
}
#page-splash.hide {
  opacity: 0;
  transform: scale(0.96);
  pointer-events: none;
}

/* ── AI BADGE ── */
.ai-badge {
  display: flex; align-items: center; gap: 8px;
  background: rgba(0,212,255,0.06);
  border: 1px solid rgba(0,212,255,0.18);
  border-radius: 100px;
  padding: 6px 16px 6px 10px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; letter-spacing: 1.5px;
  color: #00d4ff;
  margin-bottom: 28px;
  animation: fade-tagline 1s ease 0.2s both;
  user-select: none;
}
.ai-badge-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #00d4ff;
  box-shadow: 0 0 8px rgba(0,212,255,0.8);
  animation: badge-pulse 2s ease-in-out infinite;
  flex-shrink: 0;
}
@keyframes badge-pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(1.4)} }

/* ── LOGO FLOAT ── */
.logo-wrap {
  position: relative;
  animation: float-logo 4s ease-in-out infinite;
  margin-bottom: 20px;
  user-select: none;
}

@keyframes float-logo {
  0%,100% { transform: translateY(0px) rotate(-0.5deg); }
  25%      { transform: translateY(-18px) rotate(0.5deg); }
  50%      { transform: translateY(-28px) rotate(-0.3deg); }
  75%      { transform: translateY(-14px) rotate(0.4deg); }
}

.logo-main {
  font-size: clamp(72px, 12vw, 148px);
  font-weight: 800;
  letter-spacing: -4px;
  line-height: 1;
  color: #f0f6fa;
  position: relative;
  display: flex;
  align-items: baseline;
  gap: 4px;
}

.logo-main .seven {
  display: inline-block;
  color: #000;
  background: #00ff88;
  padding: 0 10px 4px;
  border-radius: 12px;
  font-style: italic;
  transform: skewX(-5deg);
  box-shadow:
    0 0 30px rgba(0,255,136,0.6),
    0 0 80px rgba(0,255,136,0.2),
    inset 0 1px 0 rgba(255,255,255,0.3);
  animation: pulse-seven 3s ease-in-out infinite;
}
@keyframes pulse-seven {
  0%,100% { box-shadow: 0 0 30px rgba(0,255,136,0.6), 0 0 80px rgba(0,255,136,0.2); }
  50%      { box-shadow: 0 0 50px rgba(0,255,136,0.9), 0 0 120px rgba(0,255,136,0.35); }
}

.logo-main .to {
  color: #00ff88;
  text-shadow: 0 0 30px rgba(0,255,136,0.6);
}

.logo-glow {
  position: absolute;
  width: 140%; height: 200%;
  left: -20%; top: -50%;
  background: radial-gradient(ellipse at center, rgba(0,255,136,0.10) 0%, transparent 65%);
  pointer-events: none;
  animation: glow-pulse 4s ease-in-out infinite;
}
@keyframes glow-pulse {
  0%,100% { opacity: 0.7; transform: scale(1); }
  50%      { opacity: 1; transform: scale(1.1); }
}

/* ── AI DESCRIPTION ── */
.ai-desc {
  text-align: center;
  margin-bottom: 36px;
  animation: fade-tagline 1s ease 0.6s both;
}
.ai-desc-main {
  font-family: 'JetBrains Mono', monospace;
  font-size: clamp(12px, 1.6vw, 15px);
  color: rgba(224,237,245,0.5);
  letter-spacing: 3px;
  text-transform: uppercase;
  line-height: 1;
  margin-bottom: 10px;
}
.ai-desc-main span { color: #00ff88; }

.ai-pills {
  display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;
  margin-top: 12px;
}
.ai-pill {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; letter-spacing: 1px;
  padding: 4px 12px; border-radius: 100px;
  border: 1px solid;
  user-select: none;
}
.pill-green { color: rgba(0,255,136,0.6); border-color: rgba(0,255,136,0.15); background: rgba(0,255,136,0.04); }
.pill-cyan  { color: rgba(0,212,255,0.6); border-color: rgba(0,212,255,0.15); background: rgba(0,212,255,0.04); }
.pill-amber { color: rgba(255,183,0,0.6); border-color: rgba(255,183,0,0.15); background: rgba(255,183,0,0.04); }

/* ── GET STARTED ── */
.cta-wrap {
  animation: fade-cta 1s ease 0.9s both;
  display: flex; flex-direction: column; align-items: center; gap: 10px;
}
@keyframes fade-cta { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
@keyframes fade-tagline { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

.btn-get-started {
  position: relative;
  padding: 16px 56px;
  font-family: 'Oxanium', sans-serif;
  font-size: 17px; font-weight: 700;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  background: transparent;
  color: #00ff88;
  border: 1.5px solid rgba(0,255,136,0.45);
  border-radius: 50px;
  cursor: none;
  overflow: hidden;
  transition: all 0.35s ease;
  outline: none;
}
.btn-get-started::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(0,255,136,0.12), transparent);
  opacity: 0; transition: opacity 0.3s;
}
.btn-get-started:hover {
  border-color: #00ff88;
  color: #000;
  background: #00ff88;
  box-shadow: 0 0 40px rgba(0,255,136,0.5), 0 0 80px rgba(0,255,136,0.2);
  transform: scale(1.04);
  letter-spacing: 3.5px;
}
.btn-get-started:hover::before { opacity: 1; }

.btn-hint {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: rgba(97,119,146,0.5);
  letter-spacing: 2px;
  animation: blink-hint 2.5s ease-in-out infinite;
}
@keyframes blink-hint { 0%,100%{opacity:0.5} 50%{opacity:0.15} }

.scroll-ind {
  position: absolute;
  bottom: 32px; left: 50%;
  transform: translateX(-50%);
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  animation: fade-tagline 1s ease 1.6s both;
}
.scroll-arrow {
  width: 1px; height: 36px;
  background: linear-gradient(to bottom, transparent, rgba(0,255,136,0.35));
  animation: scroll-drop 2s ease-in-out infinite;
}
@keyframes scroll-drop {
  0%   { opacity:0; transform: scaleY(0); transform-origin: top; }
  40%  { opacity:1; transform: scaleY(1); }
  100% { opacity:0; transform: translateY(16px); }
}

/* ══════════════════════════════════════
   TOOLTIP
══════════════════════════════════════ */
.tooltip-popup {
  position: fixed;
  background: rgba(15,20,25,0.96);
  border: 1px solid rgba(255,183,0,0.3);
  border-radius: 10px;
  padding: 9px 16px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; color: #ffb700;
  letter-spacing: 0.5px;
  pointer-events: none;
  z-index: 99999;
  opacity: 0;
  transform: translateY(4px);
  transition: opacity 0.2s, transform 0.2s;
  white-space: nowrap;
}
.tooltip-popup.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<!-- CURSORS -->
<div id="cursor"></div>
<div id="cursor-dot"></div>
<div id="cursor-ring"></div>

<!-- TOOLTIP -->
<div class="tooltip-popup" id="tooltip">⚙ Coming soon — OAuth integration pending</div>

<!-- CANVAS (floating code background) -->
<canvas id="bg-canvas"></canvas>

<!-- OVERLAYS -->
<div class="scanlines"></div>
<div class="vignette"></div>

<!-- ══ PAGE: SPLASH ══ -->
<div id="page-splash">

  <div class="ai-badge">
    <div class="ai-badge-dot"></div>
    AI-POWERED CODE EDITOR
  </div>

  <div class="logo-wrap">
    <div class="logo-glow"></div>
    <div class="logo-main">
      Code<span class="seven">7</span><span class="to">to</span>
    </div>
  </div>

  <div class="ai-desc">
    <div class="ai-desc-main">
      Code smarter with <span>AI</span> that explains, not just solves
    </div>
    <div class="ai-pills">
      <span class="ai-pill pill-green">⚡ Smart Compiler</span>
      <span class="ai-pill pill-cyan">🎬 Code Visualizer</span>
      <span class="ai-pill pill-amber">🏆 Weekly Rankings</span>
      <span class="ai-pill pill-green">🤖 AI Assistant</span>
      <span class="ai-pill pill-cyan">👥 Group Sharing</span>
    </div>
  </div>

  <div class="cta-wrap">
    <button class="btn-get-started" id="btn-start">Get Started</button>
    <span class="btn-hint">click to begin →</span>
  </div>

  <div class="scroll-ind">
    <div class="scroll-arrow"></div>
  </div>

</div>

<script>
/* ══════════════════════════════════════
   CURSOR — code bracket style
══════════════════════════════════════ */
const cursor    = document.getElementById('cursor');
const cursorDot = document.getElementById('cursor-dot');
const cursorRing= document.getElementById('cursor-ring');
let mx = window.innerWidth/2, my = window.innerHeight/2;
let rx = mx, ry = my;

document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  cursor.style.left    = mx + 'px';
  cursor.style.top     = my + 'px';
  cursorDot.style.left = mx + 'px';
  cursorDot.style.top  = my + 'px';
});

function animRing() {
  rx += (mx - rx) * 0.1;
  ry += (my - ry) * 0.1;
  cursorRing.style.left = rx + 'px';
  cursorRing.style.top  = ry + 'px';
  requestAnimationFrame(animRing);
}
animRing();

document.querySelectorAll('button, a').forEach(el => {
  el.addEventListener('mouseenter', () => document.body.classList.add('cursor-hover'));
  el.addEventListener('mouseleave', () => document.body.classList.remove('cursor-hover'));
});

/* ══════════════════════════════════════
   FLOATING CODE BACKGROUND
══════════════════════════════════════ */
const canvas = document.getElementById('bg-canvas');
const ctx    = canvas.getContext('2d');
let W, H;

// Code snippets to float
const CODE_SNIPPETS = [
  'def solve(n):',
  'for i in range(n):',
  'return total / len',
  'if x > threshold:',
  'while True:',
  'import numpy as np',
  'class Node:',
  'arr.sort(key=lambda',
  'print(f"Result: {x}")',
  '#include <stdio.h>',
  'int main() {',
  'printf("%d\\n", n);',
  'for(int i=0;i<n;i++)',
  'return 0; }',
  'malloc(sizeof(int)*n)',
  '<!DOCTYPE html>',
  '<div class="app">',
  'const [state, set]',
  'useEffect(() => {',
  'fetch("/api/run")',
  '.then(res => res.json())',
  'async function run() {',
  'await compile(code)',
  '// AI suggests:',
  'O(n log n)',
  'git commit -m "fix"',
  'npm run build',
  'docker run --rm',
  '{ "status": 200 }',
  'SELECT * FROM users',
  'WHERE score > 100',
  'Error: undefined ref',
  'Traceback (line 9):',
  '✓ Compiled successfully',
  'def binary_search():',
  'pivot = arr[mid]',
  'hash_map = {}',
  'stack.append(node)',
  'queue.popleft()',
  'try: except:',
];

let floaters = [];
const FLOATER_COUNT = 28;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', () => { resize(); initFloaters(); });
resize();

function makeFloater() {
  const snippet = CODE_SNIPPETS[Math.floor(Math.random() * CODE_SNIPPETS.length)];
  const side    = Math.random();
  let x, y, vx, vy;

  if (side < 0.25)      { x = -200; y = Math.random()*H; vx = Math.random()*0.4+0.1; vy=(Math.random()-0.5)*0.2; }
  else if (side < 0.5)  { x = W+200; y = Math.random()*H; vx = -(Math.random()*0.4+0.1); vy=(Math.random()-0.5)*0.2; }
  else if (side < 0.75) { x = Math.random()*W; y = -60; vx=(Math.random()-0.5)*0.2; vy=Math.random()*0.3+0.05; }
  else                  { x = Math.random()*W; y = H+60; vx=(Math.random()-0.5)*0.2; vy=-(Math.random()*0.3+0.05); }

  // colour palette
  const palettes = [
    { r:0,   g:255, b:136 },  // green
    { r:0,   g:212, b:255 },  // cyan
    { r:255, g:183, b:0   },  // amber
    { r:176, g:110, b:255 },  // purple
  ];
  const col = palettes[Math.floor(Math.random() * palettes.length)];

  return {
    text: snippet,
    x, y, vx, vy,
    alpha: 0,
    targetAlpha: Math.random() * 0.13 + 0.04,
    size: Math.random() * 5 + 9,
    r: col.r, g: col.g, b: col.b,
    life: 0,
    maxLife: Math.random() * 800 + 400,
    // cursor interaction
    ox: x, oy: y,
    repelled: false,
  };
}

function initFloaters() {
  floaters = [];
  for (let i = 0; i < FLOATER_COUNT; i++) {
    const f = makeFloater();
    // Scatter them across screen at start
    f.x = Math.random() * W;
    f.y = Math.random() * H;
    f.life = Math.random() * f.maxLife;
    f.alpha = f.targetAlpha;
    floaters.push(f);
  }
}
initFloaters();

// Particle field
const PARTICLE_COUNT = 80;
let particles = [];

function makeParticle() {
  return {
    x: Math.random() * W,
    y: Math.random() * H,
    vx: (Math.random()-0.5)*0.25,
    vy: (Math.random()-0.5)*0.25,
    r: Math.random()*1.2+0.3,
    baseAlpha: Math.random()*0.35+0.05,
    hue: [150,195,45,280][Math.floor(Math.random()*4)],
    phase: Math.random()*Math.PI*2,
    spd: Math.random()*0.008+0.003,
  };
}

function initParticles() {
  particles = Array.from({length: PARTICLE_COUNT}, makeParticle);
}
initParticles();

const REPEL  = 150;
const ATTRACT= 220;
const CONN   = 120;

function drawFrame(t) {
  ctx.clearRect(0, 0, W, H);

  /* ── particles ── */
  for (let i = 0; i < particles.length; i++) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;

    const dx = mx-p.x, dy = my-p.y, dist = Math.sqrt(dx*dx+dy*dy);
    if (dist < REPEL) {
      const f = (REPEL-dist)/REPEL*0.035;
      p.vx -= dx/dist*f; p.vy -= dy/dist*f;
    } else if (dist < ATTRACT) {
      const f = (dist-REPEL)/(ATTRACT-REPEL)*0.007;
      p.vx += dx/dist*f; p.vy += dy/dist*f;
    }
    p.vx *= 0.993; p.vy *= 0.993;
    const spd = Math.sqrt(p.vx*p.vx+p.vy*p.vy);
    if (spd > 2) { p.vx=p.vx/spd*2; p.vy=p.vy/spd*2; }
    if (p.x<-10) p.x=W+10; if (p.x>W+10) p.x=-10;
    if (p.y<-10) p.y=H+10; if (p.y>H+10) p.y=-10;

    const alpha = p.baseAlpha*(0.7+0.3*Math.sin(t*p.spd+p.phase));
    const glow  = dist < ATTRACT ? (1-dist/ATTRACT)*0.7 : 0;
    const fA = Math.min(1, alpha+glow*0.6);
    const fR = p.r + glow*2.5;

    ctx.beginPath();
    ctx.arc(p.x, p.y, fR, 0, Math.PI*2);
    ctx.fillStyle = `hsla(${p.hue},100%,65%,${fA})`;
    ctx.fill();

    if (glow > 0.06) {
      const g = ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,fR*5);
      g.addColorStop(0,`hsla(${p.hue},100%,65%,${glow*0.3})`);
      g.addColorStop(1,'transparent');
      ctx.beginPath(); ctx.arc(p.x,p.y,fR*5,0,Math.PI*2);
      ctx.fillStyle = g; ctx.fill();
    }

    for (let j=i+1;j<particles.length;j++) {
      const q=particles[j];
      const ddx=p.x-q.x, ddy=p.y-q.y, d2=ddx*ddx+ddy*ddy;
      if (d2<CONN*CONN) {
        const la=(1-Math.sqrt(d2)/CONN)*0.14;
        ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(q.x,q.y);
        ctx.strokeStyle=`rgba(0,255,136,${la})`; ctx.lineWidth=0.5; ctx.stroke();
      }
    }
  }

  /* ── floating code snippets ── */
  ctx.textBaseline = 'top';
  for (let i = 0; i < floaters.length; i++) {
    const f = floaters[i];
    f.life++;

    // fade in/out
    const lifeRatio = f.life / f.maxLife;
    if (lifeRatio < 0.1)       f.alpha = f.targetAlpha * (lifeRatio / 0.1);
    else if (lifeRatio > 0.85) f.alpha = f.targetAlpha * ((1-lifeRatio)/0.15);
    else                       f.alpha = f.targetAlpha;

    // cursor repulsion for floaters
    const fdx = mx - f.x, fdy = my - f.y;
    const fdist = Math.sqrt(fdx*fdx + fdy*fdy);
    if (fdist < 200 && fdist > 0) {
      const force = (200-fdist)/200 * 0.6;
      f.vx -= fdx/fdist * force * 0.015;
      f.vy -= fdy/fdist * force * 0.015;
    }
    f.vx *= 0.98; f.vy *= 0.98;

    // clamp floater speed
    const fs = Math.sqrt(f.vx*f.vx+f.vy*f.vy);
    if (fs > 1.2) { f.vx=f.vx/fs*1.2; f.vy=f.vy/fs*1.2; }

    f.x += f.vx; f.y += f.vy;

    // respawn when off screen or life ended
    if (f.life > f.maxLife || f.x < -300 || f.x > W+300 || f.y < -100 || f.y > H+100) {
      floaters[i] = makeFloater();
      continue;
    }

    if (f.alpha <= 0.001) continue;

    ctx.save();
    ctx.font = `${f.size}px 'JetBrains Mono', monospace`;
    ctx.fillStyle = `rgba(${f.r},${f.g},${f.b},${f.alpha})`;
    ctx.fillText(f.text, f.x, f.y);

    // subtle glow on text
    ctx.shadowColor  = `rgba(${f.r},${f.g},${f.b},${f.alpha * 0.5})`;
    ctx.shadowBlur   = 8;
    ctx.fillText(f.text, f.x, f.y);
    ctx.restore();
  }

  requestAnimationFrame(drawFrame);
}
requestAnimationFrame(drawFrame);

/* ══════════════════════════════════════
   PAGE TRANSITION → login.html
══════════════════════════════════════ */
const splash = document.getElementById('page-splash');

document.getElementById('btn-start').addEventListener('click', () => {
  splash.classList.add('hide');
  setTimeout(() => {
    window.location.href = '/login';
  }, 700);
});

/* tooltip (kept for future use) */
const tooltip = document.getElementById('tooltip');
</script>
</body>
</html>
